name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build (static export)
        env:
          NEXT_PUBLIC_BASE_PATH: /ci-build
          NEXT_PUBLIC_SITE_URL: https://yjyinfo.github.io/scenebox-reader
        run: npm run build
